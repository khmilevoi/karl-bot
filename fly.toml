# fly.toml app configuration file generated for karl-bot on 2025-07-09T15:06:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "karl-bot"
primary_region = "waw"

[build]

[[mounts]]
source = "data"
destination = "/data"

[http_service]
internal_port = 3000
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1
memory_mb = 1024
