# Development override — layered on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Builds the lighter `deps` stage (full source + dev deps, no pre-built dist),
# bind-mounts the source for live rebuilds, and tags it karl-bot:dev so it never
# clobbers the production image. migrate / depends_on / init are inherited from
# the base file, so the migrate-once-then-start ordering still holds.
x-dev: &dev
  build:
    context: .
    target: deps
  image: karl-bot:dev
  volumes:
    - ./src:/app/src
    - ./prompts:/app/prompts
    - ./migrations:/app/migrations
    - ./rsbuild.config.ts:/app/rsbuild.config.ts
    - ./tsconfig.json:/app/tsconfig.json
    # DB on the named volume (see docker-compose.yml) — NOT a host bind mount,
    # so WAL works and restarts no longer hit SQLITE_IOERR. Source still bind-
    # mounts above for live reload; only /data moved off the host filesystem.
    - db-data:/data

services:
  # The deps image has no pre-built dist, so build before migrating.
  migrate:
    <<: *dev
    entrypoint: ['sh', '-c']
    command: ['pnpm build && node dist/migrate.js up']

  # -L (nodemon --legacy-watch) forces polling: inotify events don't cross the
  # Windows-host -> Linux-container bind mount, so without it edits never trigger
  # a rebuild. Polling lives here (not in the package.json script) so host-side
  # `pnpm dev` keeps using fast native fs events.
  app:
    <<: *dev
    command: pnpm dev
    healthcheck:
      disable: true

  worker:
    <<: *dev
    command: pnpm dev:worker
